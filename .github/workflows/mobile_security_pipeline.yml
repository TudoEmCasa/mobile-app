name: Mobile Security Pipeline

on:
  push:
    tags:
      - 'v*'

  schedule:
    - cron: '0 3 * * 0'

  workflow_dispatch:

jobs:
  mobsf-security:
    name: MobSF Security Scan
    runs-on: ubuntu-latest

    timeout-minutes: 45

    permissions:
      contents: read

    env:
      MOBSF_API_KEY: mobsf-github-actions-key

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release

      - name: Start MobSF
        run: |
          docker run -d \
            --name mobsf \
            -p 8000:8000 \
            -e MOBSF_API_KEY=${MOBSF_API_KEY} \
            opensecurity/mobile-security-framework-mobsf:latest

      - name: Wait for MobSF
        run: |
          echo "Waiting for MobSF startup..."
          timeout 300 bash -c '
            until curl -s http://127.0.0.1:8000 > /dev/null; do
              sleep 5
            done
          '

      - name: Upload APK
        id: upload
        run: |
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"

          RESPONSE=$(curl -s \
            -H "Authorization: ${MOBSF_API_KEY}" \
            -F "file=@${APK_PATH}" \
            http://127.0.0.1:8000/api/v1/upload)

          echo "$RESPONSE" > upload.json

          HASH=$(jq -r '.hash' upload.json)

          echo "hash=$HASH" >> $GITHUB_OUTPUT

      - name: Start Scan
        run: |
          curl -s \
            -H "Authorization: ${MOBSF_API_KEY}" \
            -F "scan_type=apk" \
            -F "hash=${{ steps.upload.outputs.hash }}" \
            http://127.0.0.1:8000/api/v1/scan

      - name: Wait for Analysis
        run: sleep 60

      - name: Download JSON Report
        run: |
          curl -s \
            -H "Authorization: ${MOBSF_API_KEY}" \
            -F "hash=${{ steps.upload.outputs.hash }}" \
            http://127.0.0.1:8000/api/v1/report_json \
            -o mobsf-report.json

      - name: Upload MobSF Report
        uses: actions/upload-artifact@v4
        with:
          name: mobsf-report
          path: mobsf-report.json

      - name: Stop MobSF
        if: always()
        run: |
          docker stop mobsf
          docker rm mobsf
