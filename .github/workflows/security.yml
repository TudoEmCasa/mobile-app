name: Security Pipeline

on:
  pull_request:

  push:
    branches:
      - main

  schedule:
    - cron: '0 3 * * *'

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trivy-security:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Cache Trivy DB
        uses: actions/cache@v6
        with:
          path: ~/.cache/trivy
          key: trivy-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            trivy-${{ runner.os }}-

      - name: Define severities
        id: severity
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "levels=MEDIUM,HIGH,CRITICAL" >> $GITHUB_OUTPUT
          else
            echo "levels=HIGH,CRITICAL" >> $GITHUB_OUTPUT
          fi

      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'

          scanners: 'vuln,secret,config'

          severity: ${{ steps.severity.outputs.levels }}

          ignore-unfixed: true

          exit-code: '1'

          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy SARIF Report
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

  semgrep-security:
    name: Semgrep SAST Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    if: github.event_name != 'schedule'

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/owasp-top-ten

          generateSarif: "1"

      - name: Upload Semgrep SARIF Report
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif